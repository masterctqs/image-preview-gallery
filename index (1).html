<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accessible Photo Gallery</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --text: #e8e2d9;
      --muted: #7a7269;
      --accent: #c9a96e;
    }

    body {
      font-family: 'Lato', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
    }

    .skip-link {
      position: absolute;
      top: -999px;
      left: 1rem;
      background: var(--accent);
      color: #000;
      padding: 0.5rem 1rem;
      font-weight: 700;
      border-radius: 0 0 4px 4px;
      z-index: 1000;
      text-decoration: none;
    }
    .skip-link:focus { top: 0; }

    header { text-align: center; margin-bottom: 2.5rem; }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    header h1 span { color: var(--accent); font-style: italic; }

    header h2 {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    #preview-area { max-width: 800px; margin: 0 auto 3rem; }

    #image {
      width: 100%;
      height: 380px;
      background-color: var(--surface);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border: 1px solid var(--border);
      border-radius: 2px;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      transition: background-image 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    #image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 55%);
      pointer-events: none;
    }

    #image p {
      position: relative;
      z-index: 1;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--text);
      padding: 1.2rem 1.5rem;
      font-style: italic;
    }

    main#gallery {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    figure {
      margin: 0;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--surface);
      transition: border-color 0.2s ease;
      outline: none;
      cursor: pointer;
    }

    figure:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.4);
    }

    figure:hover { border-color: var(--accent); }

    figure img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
      pointer-events: none;
    }

    figure:hover img,
    figure:focus img { transform: scale(1.04); }

    figcaption {
      padding: 0.55rem 0.7rem;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 700;
    }

    footer {
      text-align: center;
      margin-top: 3.5rem;
      font-size: 0.75rem;
      color: var(--border);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      main#gallery { grid-template-columns: repeat(2, 1fr); }
      #image { height: 240px; }
    }
  </style>
</head>
<body>

  <a class="skip-link" href="#gallery">Skip to gallery</a>

  <header>
    <h1>Photo <span>Gallery</span></h1>
    <h2>Hover or use keyboard Tab key to explore</h2>
  </header>

  <div id="preview-area" aria-live="polite" aria-label="Image preview area">
    <div id="image" role="img" aria-label="Preview area">
      <p>Hover over or focus an image below to preview it here.</p>
    </div>
  </div>

  <main id="gallery" aria-label="Photo gallery thumbnails">

    <figure onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="upDate(this)" onblur="unDo()">
      <img
        src="https://picsum.photos/seed/redwood/600/400"
        alt="Tall redwood trees stretching toward a misty sky in a dense forest"
      />
      <figcaption>Redwood Forest</figcaption>
    </figure>

    <figure onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="upDate(this)" onblur="unDo()">
      <img
        src="https://picsum.photos/seed/coastline/600/400"
        alt="Rocky Pacific coastline with waves crashing against dark sea cliffs at sunset"
      />
      <figcaption>Pacific Coast</figcaption>
    </figure>

    <figure onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="upDate(this)" onblur="unDo()">
      <img
        src="https://picsum.photos/seed/alpine/600/400"
        alt="Snow-capped alpine mountain peaks reflected in a still glacial lake"
      />
      <figcaption>Alpine Lake</figcaption>
    </figure>

    <figure onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="upDate(this)" onblur="unDo()">
      <img
        src="https://picsum.photos/seed/desert2/600/400"
        alt="Golden sand dunes under a deep blue sky in an arid desert landscape"
      />
      <figcaption>Desert Dunes</figcaption>
    </figure>

    <figure onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="upDate(this)" onblur="unDo()">
      <img
        src="https://picsum.photos/seed/meadow7/600/400"
        alt="Wildflower meadow in full bloom with purple and yellow flowers under soft morning light"
      />
      <figcaption>Wildflower Meadow</figcaption>
    </figure>

    <figure onmouseover="upDate(this)" onmouseleave="unDo()" onfocus="upDate(this)" onblur="unDo()">
      <img
        src="https://picsum.photos/seed/canyon9/600/400"
        alt="Dramatic red rock canyon walls with layers of sandstone glowing in warm afternoon light"
      />
      <figcaption>Red Rock Canyon</figcaption>
    </figure>

  </main>

  <footer>
    <p>Accessible Photo Gallery &mdash; Built with HTML, CSS &amp; JavaScript</p>
  </footer>

  <script>
    const previewDiv = document.getElementById('image');

    // Called on mouseover and onfocus — updates preview with hovered/focused image
    function upDate(figure) {
      console.log('upDate triggered on figure:', figure);
      const img = figure.querySelector('img');
      console.log('alt text:', img.alt);
      console.log('src:', img.src);

      previewDiv.querySelector('p').textContent = img.alt;
      previewDiv.style.backgroundImage = "url('" + img.src + "')";
      previewDiv.setAttribute('aria-label', 'Preview of: ' + img.alt);
    }

    // Called on mouseleave and onblur — resets preview to default
    function unDo() {
      previewDiv.style.backgroundImage = "url('')";
      previewDiv.querySelector('p').textContent =
        'Hover over or focus an image below to preview it here.';
      previewDiv.setAttribute('aria-label', 'Image preview area');
    }

    // Called on window.onload — adds tabindex="0" to every figure
    function addTabIndex() {
      console.log('addTabIndex triggered — page fully loaded');
      const figures = document.querySelectorAll('figure');
      for (let i = 0; i < figures.length; i++) {
        figures[i].setAttribute('tabindex', '0');
        console.log('tabindex="0" added to figure index', i);
      }
    }

    window.onload = addTabIndex;
  </script>

</body>
</html>
