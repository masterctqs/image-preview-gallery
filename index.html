<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Preview Gallery</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a2e;
      --paper: #f5f0e8;
      --accent: #c0392b;
      --muted: #8a8070;
      --border: #d6cfc3;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    header p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 0.4rem;
      font-weight: 300;
    }

    /* Main preview area */
    #image {
      width: 100%;
      max-width: 700px;
      margin: 0 auto 2.5rem;
      height: 320px;
      border: 2px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #ede8df;
      transition: background-image 0.3s ease, background-color 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    #image::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #image.has-image::before { opacity: 1; }

    #image p {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--muted);
      text-align: center;
      padding: 1rem;
      position: relative;
      z-index: 1;
      transition: color 0.3s ease;
    }

    #image.has-image p {
      color: #fff;
      font-size: 1.3rem;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    /* Thumbnail strip */
    #gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      max-width: 760px;
      margin: 0 auto;
    }

    .thumbnail-wrap {
      position: relative;
      cursor: pointer;
    }

    .thumbnail-wrap img {
      width: 140px;
      height: 100px;
      object-fit: cover;
      border-radius: 3px;
      border: 2px solid transparent;
      display: block;
      transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .thumbnail-wrap:hover img {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .thumbnail-wrap span {
      display: block;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.35rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.8rem;
      color: var(--border);
      font-weight: 300;
    }
  </style>
</head>
<body>

  <header>
    <h1>Image Preview</h1>
    <p>Hover over a thumbnail to preview it above</p>
  </header>

  <!-- Main preview div — id="image" is required by the assignment -->
  <div id="image">
    <p>Hover over an image below to display here.</p>
  </div>

  <!-- Thumbnail gallery -->
  <div id="gallery">

    <div class="thumbnail-wrap">
      <img
        src="https://picsum.photos/seed/forest/400/300"
        alt="Forest Path"
        onmouseover="upDate(this)"
        onmouseout="unDo()"
      />
      <span>Forest Path</span>
    </div>

    <div class="thumbnail-wrap">
      <img
        src="https://picsum.photos/seed/ocean/400/300"
        alt="Ocean Waves"
        onmouseover="upDate(this)"
        onmouseout="unDo()"
      />
      <span>Ocean Waves</span>
    </div>

    <div class="thumbnail-wrap">
      <img
        src="https://picsum.photos/seed/mountain/400/300"
        alt="Mountain Peak"
        onmouseover="upDate(this)"
        onmouseout="unDo()"
      />
      <span>Mountain Peak</span>
    </div>

    <div class="thumbnail-wrap">
      <img
        src="https://picsum.photos/seed/city/400/300"
        alt="City Lights"
        onmouseover="upDate(this)"
        onmouseout="unDo()"
      />
      <span>City Lights</span>
    </div>

    <div class="thumbnail-wrap">
      <img
        src="https://picsum.photos/seed/desert/400/300"
        alt="Desert Dunes"
        onmouseover="upDate(this)"
        onmouseout="unDo()"
      />
      <span>Desert Dunes</span>
    </div>

  </div>

  <footer>Hover Gallery &mdash; JavaScript DOM Practice</footer>

  <script>
    // Grab the preview div once so we don't query it repeatedly
    const previewDiv = document.getElementById('image');

    /**
     * upDate — called on mouseover of a thumbnail
     * @param {HTMLImageElement} previewPic  the img element being hovered
     */
    function upDate(previewPic) {
      // Step 1 – confirm the event fires
      console.log('upDate triggered');

      // Step 2 – inspect the hovered image
      console.log('alt:', previewPic.alt);
      console.log('src:', previewPic.src);

      // Step 3 – update the text inside #image
      previewDiv.querySelector('p').textContent = previewPic.alt;

      // Step 4 – update the background image of #image
      previewDiv.style.backgroundImage = "url('" + previewPic.src + "')";

      // Add helper class for the overlay fade-in
      previewDiv.classList.add('has-image');
    }

    /**
     * unDo — called on mouseout; resets the preview div
     */
    function unDo() {
      // Reset background image to empty
      previewDiv.style.backgroundImage = "url('')";

      // Reset caption text
      previewDiv.querySelector('p').textContent = 'Hover over an image below to display here.';

      // Remove overlay class
      previewDiv.classList.remove('has-image');
    }
  </script>

</body>
</html>
